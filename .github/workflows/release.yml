name: Build & Release

# Push a version tag (e.g. v1.1.0)  →  full build + native installers + GitHub release
# Push to main / open PR            →  CI build only (no release)
on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  MAIN_CLASS: "com.choirmanager.App"
  APP_VENDOR: "ChoirManager"

jobs:

  # ============================================================================
  # Job 1 — Build fat JAR on Ubuntu (fast, cached Maven)
  # ============================================================================
  build-jar:
    name: Build fat JAR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Read project version
        id: version
        run: |
          V=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "value=$V" >> "$GITHUB_OUTPUT"

      - name: Build fat JAR
        run: mvn --batch-mode package -DskipTests

      - uses: actions/upload-artifact@v4
        with:
          name: fat-jar
          path: target/choir-manager-${{ steps.version.outputs.value }}.jar
          retention-days: 7

  # ============================================================================
  # Job 2 — Native installers (Windows .exe  +  macOS .dmg)
  # Only runs when a version tag is pushed
  # ============================================================================
  package-native:
    name: Package native installer (${{ matrix.platform }})
    needs: build-jar
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            jpackage_type: exe

          - platform: macos
            os: macos-latest
            jpackage_type: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: fat-jar
          path: target/

      # ── macOS: PNG → .icns ────────────────────────────────────────────────
      - name: Build .icns icon (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p packaging/icons/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size packaging/icons/icon.png \
              --out packaging/icons/icon.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double packaging/icons/icon.png \
              --out packaging/icons/icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns packaging/icons/icon.iconset -o packaging/icons/icon.icns
          echo "icon.icns built"

      # ── Windows: install WiX 3 (jpackage needs it for .exe) ───────────────
      - name: Install WiX toolset (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1 -y --no-progress
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | `
            Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      # ── jpackage — Windows ────────────────────────────────────────────────
      - name: Run jpackage (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $V   = "${{ needs.build-jar.outputs.version }}"
          $JAR = "choir-manager-${V}.jar"
          mkdir dist

          jpackage `
            --type            exe `
            --input           target `
            --main-jar        $JAR `
            --main-class      $env:MAIN_CLASS `
            --name            "Choir Manager" `
            --app-version     $V `
            --vendor          $env:APP_VENDOR `
            --description     "Desktop app for managing choir rosters, attendance and photos." `
            --icon            packaging/icons/icon.ico `
            --dest            dist `
            --win-dir-chooser `
            --win-menu        `
            --win-shortcut    `
            --java-options    "--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED" `
            --java-options    "--add-opens=javafx.controls/com.sun.javafx.scene.control=ALL-UNNAMED"

          # Rename to versioned filename
          $built = Get-ChildItem dist\*.exe | Select-Object -First 1
          $dest  = "dist\choir-manager-${V}-windows-setup.exe"
          Rename-Item $built.FullName $dest
          Write-Host "Packaged: $dest"

      # ── jpackage — macOS ──────────────────────────────────────────────────
      - name: Run jpackage (macOS)
        if: matrix.platform == 'macos'
        run: |
          V="${{ needs.build-jar.outputs.version }}"
          JAR="choir-manager-${V}.jar"
          mkdir -p dist

          jpackage \
            --type            dmg \
            --input           target \
            --main-jar        "$JAR" \
            --main-class      "$MAIN_CLASS" \
            --name            "Choir Manager" \
            --app-version     "$V" \
            --vendor          "$APP_VENDOR" \
            --description     "Desktop app for managing choir rosters, attendance and photos." \
            --icon            packaging/icons/icon.icns \
            --dest            dist \
            --java-options    "--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED" \
            --java-options    "--add-opens=javafx.controls/com.sun.javafx.scene.control=ALL-UNNAMED"

          mv dist/*.dmg "dist/choir-manager-${V}-macos.dmg"
          echo "Packaged: choir-manager-${V}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: dist/choir-manager-*
          retention-days: 7

  # ============================================================================
  # Job 3 — Create GitHub Release, attach all four assets
  # ============================================================================
  release:
    name: Publish GitHub Release
    needs: [build-jar, package-native]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: fat-jar
          path: dist/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: dist/

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: installer-macos
          path: dist/

      - name: Build source zip
        run: |
          V="${{ needs.build-jar.outputs.version }}"
          zip -r "dist/choir-manager-${V}-source.zip" . \
            --exclude ".git/*" --exclude "target/*" \
            --exclude "photo_cache/*" --exclude "tokens/*" \
            --exclude "*.db" --exclude "credentials.json"

      - name: Extract release notes from CHANGELOG
        run: |
          V="${{ needs.build-jar.outputs.version }}"
          python3 - "$V" CHANGELOG.md << 'PYEOF'
          import sys, re
          version, path = sys.argv[1], sys.argv[2]
          text = open(path).read()
          m = re.search(rf'(## \[{re.escape(version)}\].*?)(?=\n## \[|\Z)', text, re.DOTALL)
          open("release_notes.md", "w").write(m.group(1).strip() if m else f"Release {version}")
          PYEOF

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Choir Manager v${{ needs.build-jar.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(needs.build-jar.outputs.version, '-') }}
          files: |
            dist/choir-manager-${{ needs.build-jar.outputs.version }}-windows-setup.exe
            dist/choir-manager-${{ needs.build-jar.outputs.version }}-macos.dmg
            dist/choir-manager-${{ needs.build-jar.outputs.version }}.jar
            dist/choir-manager-${{ needs.build-jar.outputs.version }}-source.zip
