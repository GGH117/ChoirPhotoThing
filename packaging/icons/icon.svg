<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c6fad"/>
      <stop offset="100%" style="stop-color:#1a4f80"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Music note -->
  <g fill="white">
    <!-- Note head 1 -->
    <ellipse cx="168" cy="310" rx="52" ry="38" transform="rotate(-15,168,310)"/>
    <!-- Note stem 1 -->
    <rect x="212" y="150" width="18" height="168" rx="9"/>
    <!-- Note head 2 -->
    <ellipse cx="320" cy="270" rx="52" ry="38" transform="rotate(-15,320,270)"/>
    <!-- Note stem 2 -->
    <rect x="364" y="110" width="18" height="168" rx="9"/>
    <!-- Beam connecting stems -->
    <rect x="212" y="150" width="170" height="22" rx="11"/>
    <!-- People silhouettes below -->
    <circle cx="160" cy="390" r="28"/>
    <ellipse cx="160" cy="448" rx="36" ry="28"/>
    <circle cx="256" cy="378" r="28"/>
    <ellipse cx="256" cy="436" rx="36" ry="28"/>
    <circle cx="352" cy="390" r="28"/>
    <ellipse cx="352" cy="448" rx="36" ry="28"/>
  </g>
</svg>
